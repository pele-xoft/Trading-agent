kind = "web"
previewPath = "/"
title = "ChartMind"
version = "1.0.0"
id = "artifacts/chartmind"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21944

[services.development]
run = "pnpm --filter @workspace/chartmind run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chartmind", "run", "build" ]
publicDir = "artifacts/chartmind/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21944"
BASE_PATH = "/"
